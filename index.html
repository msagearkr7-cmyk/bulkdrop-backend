<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BulkDrop - Free yt-dlp Edition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #e8e8e8; font-family: 'SF Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px; }
  .logo { font-size: 11px; letter-spacing: 0.3em; color: #444; text-transform: uppercase; margin-bottom: 48px; text-align: center; }
  .logo span { color: #fff; font-size: 22px; display: block; letter-spacing: 0.15em; margin-bottom: 4px; }
  .box { width: 100%; max-width: 520px; }
  input { width: 100%; background: #111; border: 1px solid #222; color: #e8e8e8; padding: 12px 16px; font-size: 14px; border-radius: 4px; outline: none; }
  input:focus { border-color: #555; }
  button { background: #e8e8e8; color: #0a0a0a; border: none; padding: 12px 20px; font-size: 13px; font-weight: 700; cursor: pointer; border-radius: 4px; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  .status { font-size: 12px; color: #444; min-height: 20px; margin-top: 14px; }
  .status.active { color: #888; }
  .status.error { color: #e05555; }
  .status.success { color: #55e08a; }
  .input-row, .controls-row, .action-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .input-row input { flex: 1; }
  .controls-row input[type="number"] { width: 70px; text-align: center; padding: 8px; }
  .controls-row label { font-size: 11px; color: #444; text-transform: uppercase; display: flex; align-items: center; }
  .user-list { display: flex; flex-direction: column; gap: 6px; max-height: 380px; overflow-y: auto; margin-top: 10px; }
  .user-item { background: #111; border: 1px solid #1a1a1a; border-radius: 4px; padding: 10px; display: flex; align-items: center; gap: 10px; }
  .avatar { width: 40px; height: 40px; border-radius: 4px; background: #1a1a1a; object-fit: cover; }
  .info { flex: 1; overflow: hidden; font-size: 12px; }
  .uname { color: #e8e8e8; font-weight: 700; white-space: nowrap; }
  .fname { color: #555; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .btn-outline { background: transparent; color: #888; border: 1px solid #222; }
  .btn-accent { background: #55e08a; color: #0a0a0a; flex: 1;}
</style>
</head>
<body>

<div class="logo"><span>BULKDROP</span>yt-dlp edition</div>

<div class="box">
  <div class="input-row">
    <input type="text" id="username" placeholder="@username or instagram.com/user" />
    <button id="fetchBtn" onclick="fetchReels()">FETCH</button>
  </div>
  <div class="controls-row">
    <label>Count:</label>
    <input type="number" id="amount" value="12" min="1" max="200" />
  </div>
  <div class="status" id="fetchStatus">Enter username to start</div>

  <div class="user-list" id="userList"></div>

  <div class="action-row" id="actionRow" style="display:none; margin-top:15px;">
    <button class="btn-outline" onclick="copyUrls()">COPY URLS</button>
    <button class="btn-accent" id="downloadAllBtn" onclick="downloadAll()">DOWNLOAD ALL</button>
  </div>
</div>

<script>
  // Ensure this matches your cloud hosting address
  const BACKEND = 'https://bulkdrop-backend.onrender.com'; 
  let allUsers = [];

  async function fetchReels() {
    const raw = document.getElementById('username').value.trim();
    if (!raw) return;

    allUsers = [];
    document.getElementById('userList').innerHTML = '';
    document.getElementById('actionRow').style.display = 'none';
    const amount = parseInt(document.getElementById('amount').value) || 12;

    setStatus(`Scraping profiles via cloud instance...`, 'active');
    document.getElementById('fetchBtn').disabled = true;

    try {
      const res = await fetch(`${BACKEND}/reels`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: raw, amount })
      });
      const data = await res.json();

      if (!res.ok) {
        setStatus(data.error || 'Failed to fetch profile structural data.', 'error');
        document.getElementById('fetchBtn').disabled = false;
        return;
      }

      allUsers = data.reels || [];
      if (!allUsers.length) {
        setStatus(`Profile data structured but zero media items identified.`, 'error');
        document.getElementById('fetchBtn').disabled = false;
        return;
      }

      setStatus(`Successfully pulled metadata tracking records for ${allUsers.length} entries.`, 'success');
      renderUsers(allUsers);
      document.getElementById('actionRow').style.display = 'flex';
    } catch (e) {
      setStatus('Network timeout connecting with background container.', 'error');
    }
    document.getElementById('fetchBtn').disabled = false;
  }

  function renderUsers(reels) {
    const list = document.getElementById('userList');
    reels.forEach(r => {
      const item = document.createElement('div');
      item.className = 'user-item';
      item.innerHTML = `
        <img class="avatar" src="${r.thumbnail}" onerror="this.src=''" />
        <div class="info">
          <div class="uname">${r.id || 'Video ID Record'}</div>
          <div class="fname">${r.caption}</div>
          <div style="font-size: 10px; color:#555; margin-top:4px;">Plays registered: ${r.play_count}</div>
        </div>
        <button class="btn-outline" style="padding:6px 12px; font-size:10px;" onclick="extractAndDownload('${r.url}')">DOWNLOAD</button>
      `;
      list.appendChild(item);
    });
  }

  async function extractAndDownload(igUrl) {
    setStatus('Resolving video stream assets...', 'active');
    try {
      const res = await fetch(`${BACKEND}/download`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: igUrl })
      });
      const data = await res.json();
      
      if (res.ok && data.url) {
        setStatus('Media pipeline ready.', 'success');
        window.open(data.url + '&dl=1', '_blank');
      } else {
        setStatus(data.error || 'Unable to resolve raw stream endpoint.', 'error');
      }
    } catch (err) {
      setStatus('Network disruption occurred across system endpoints.', 'error');
    }
  }

  async function downloadAll() {
    alert("CRITICAL REQUIREMENT: Enable pop-up exceptions for this tab in your browser navigation settings!");
    document.getElementById('downloadAllBtn').disabled = true;

    for (let i = 0; i < allUsers.length; i++) {
      if (!allUsers[i].url) continue;
      setStatus(`Processing pipeline download ${i + 1}/${allUsers.length}...`, 'active');
      await extractAndDownload(allUsers[i].url);
      await new Promise(r => setTimeout(r, 2000)); 
    }
    setStatus('Batch download sequencing execution complete.', 'success');
    document.getElementById('downloadAllBtn').disabled = false;
  }

  function copyUrls() {
    const urls = allUsers.map(r => r.url).filter(Boolean).join('\n');
    navigator.clipboard.writeText(urls);
    setStatus(`Copied ${allUsers.length} direct target references.`, 'success');
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('fetchStatus');
    el.textContent = msg;
    el.className = 'status ' + type;
  }
</script>
</body>
</html>
