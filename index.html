<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BulkDrop Pro & Niche Intelligence</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body { 
    background-color: #000; 
    color: #f5f5f7; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 40px 24px; 
    position: relative;
    overflow-x: hidden;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    z-index: -1;
    opacity: 0.6;
    animation: drift 15s infinite alternate ease-in-out;
  }
  body::before { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #5e5ce6; }
  body::after { bottom: -10%; right: -10%; width: 40vw; height: 40vw; background: #bf5af2; animation-delay: -5s; }
  @keyframes drift { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(5%, 5%) scale(1.1); } }

  /* Navigation */
  .nav-tabs { display: flex; gap: 8px; margin-bottom: 24px; background: rgba(30, 30, 35, 0.4); padding: 6px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(24px); }
  .nav-tab { padding: 10px 20px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.5); cursor: pointer; border-radius: 12px; transition: all 0.2s; }
  .nav-tab.active { background: rgba(255,255,255,0.1); color: #fff; }
  .nav-tab:hover:not(.active) { color: #fff; }

  .logo { font-size: 13px; font-weight: 500; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-bottom: 24px; text-align: center; }
  .logo span { color: #fff; font-size: 28px; font-weight: 700; display: block; letter-spacing: 0; margin-bottom: 4px; }
  
  .box { width: 100%; max-width: 650px; }
  
  .glass-panel {
    background: rgba(30, 30, 35, 0.4);
    -webkit-backdrop-filter: blur(24px);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }

  .settings-toggle { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.5); cursor: pointer; text-align: right; margin-bottom: 16px; transition: color 0.2s; display: flex; justify-content: flex-end; align-items: center; gap: 6px;}
  .settings-toggle:hover { color: #fff; }
  .settings-panel { display: none; background: rgba(0,0,0,0.3); border-radius: 16px; padding: 16px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
  
  .input-group { margin-bottom: 12px; }
  .input-group label { display: block; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.7); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  
  textarea, .text-input, select { width: 100%; background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.1); color: #f5f5f7; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; border-radius: 16px; outline: none; transition: all 0.2s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);}
  textarea { height: 160px; resize: vertical; margin-bottom: 16px; }
  .text-input, select { height: 50px; margin-bottom: 16px; }
  textarea:focus, .text-input:focus, select:focus { border-color: rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); box-shadow: 0 0 0 4px rgba(255,255,255,0.05); }
  textarea::placeholder, .text-input::placeholder { color: rgba(255,255,255,0.3); }

  .row-inputs { display: flex; gap: 12px; }
  .row-inputs .input-group { flex: 1; }

  button { background: #fff; color: #000; border: none; padding: 14px 24px; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 14px; transition: all 0.2s; width: 100%; font-family: inherit;}
  button:hover { transform: scale(0.98); opacity: 0.9; }
  button:active { transform: scale(0.96); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  
  .btn-accent { background: #0a84ff; color: #fff; } 
  .btn-accent:hover { background: #007aff; }

  .status { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.5); min-height: 20px; margin-top: 16px; text-align: center; }
  .status.active { color: #0a84ff; }
  .status.error { color: #ff453a; }
  .status.success { color: #32d74b; }
  
  .list-header { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 32px; margin-bottom: 12px; display: none; justify-content: space-between;}
  .data-list { display: flex; flex-direction: column; gap: 8px; max-height: 500px; overflow-y: auto; padding-right: 4px;}
  
  .data-item { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; font-size: 13px; transition: background 0.2s;}
  .data-item:hover { background: rgba(255, 255, 255, 0.08); }
  
  .dl-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  
  .niche-title { font-weight: 600; color: #fff; font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
  .niche-stats { display: flex; gap: 12px; font-size: 11px; color: rgba(255,255,255,0.6); }
  .niche-links { display: flex; gap: 8px; margin-top: 8px; }
  .niche-links a { color: #0a84ff; text-decoration: none; font-size: 11px; font-weight: 600; background: rgba(10, 132, 255, 0.15); padding: 4px 10px; border-radius: 8px; transition: background 0.2s; }
  .niche-links a:hover { background: rgba(10, 132, 255, 0.25); }

  .plat-badge { font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.05em; text-align: center; flex-shrink: 0;}
  .bg-ig { background: rgba(225, 48, 108, 0.2); color: #ff307b; }
  .bg-tt { background: rgba(255, 255, 255, 0.1); color: #fff; }
  .bg-yt { background: rgba(255, 0, 0, 0.15); color: #ff3b30; }
  .bg-fb { background: rgba(24, 119, 242, 0.2); color: #1877f2; }

  .item-url { color: #f5f5f7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-family: ui-monospace, monospace; font-size: 12px; opacity: 0.8;}
  .item-status { font-size: 11px; padding: 4px 10px; border-radius: 8px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); white-space: nowrap; font-weight: 600; }
  
  .status-ready { color: rgba(255,255,255,0.6); }
  .status-working { color: #0a84ff; background: rgba(10, 132, 255, 0.15); }
  .status-done { color: #32d74b; background: rgba(50, 215, 75, 0.15); }
  .status-failed { color: #ff453a; background: rgba(255, 69, 58, 0.15); }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
</style>
</head>
<body>

<div class="logo"><span>BulkDrop Pro</span>Multi-Platform Engine</div>

<!-- Nav tabs now use direct IDs without inline onclicks -->
<div class="nav-tabs">
  <div class="nav-tab active" id="tab-downloader">Batch Downloader</div>
  <div class="nav-tab" id="tab-niche">Niche Finder Intelligence</div>
</div>

<div class="box">
  
  <!-- VIEW 1: DOWNLOADER -->
  <div class="glass-panel" id="view-downloader">
    <div class="settings-toggle" id="btn-toggle-settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      Authentication Setup
    </div>
    
    <div class="settings-panel" id="settingsPanel">
      <div style="font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8); justify-content: space-between; display: flex; margin-bottom: 12px;">
        <span>Platform Cookies Setup:</span>
        <span style="color: #0a84ff; cursor:pointer;" id="btn-save-cookies">Save Settings</span>
      </div>
      <div class="input-group"><label>Instagram Cookies</label><textarea id="cookiesIg" style="height: 70px" placeholder="# Netscape HTTP Cookie File..."></textarea></div>
      <div class="input-group"><label>TikTok Cookies</label><textarea id="cookiesTt" style="height: 70px" placeholder="# Netscape HTTP Cookie File..."></textarea></div>
      <div class="input-group"><label>Facebook Cookies</label><textarea id="cookiesFb" style="height: 70px" placeholder="# Netscape HTTP Cookie File..."></textarea></div>
      <div class="input-group"><label>YouTube Cookies</label><textarea id="cookiesYt" style="height: 70px" placeholder="# Netscape HTTP Cookie File..."></textarea></div>
    </div>

    <textarea id="bulkInput" placeholder="Paste Video URLs here...&#10;https://www.instagram.com/reel/abc123/&#10;https://www.tiktok.com/@user/video/12345&#10;Glued links and messy text are okay!"></textarea>
    <button id="formatBtn">Format Batch List</button>
    <div class="status" id="dlStatus">Ready to process links.</div>

    <div class="list-header" id="dlListHeader"><span id="dlListCount">0 Videos Found</span></div>
    <div class="data-list" id="urlList"></div>

    <div style="display:flex; gap:12px; margin-top:16px;">
      <button class="btn-accent" id="downloadAllBtn" style="display:none;">Start Batch Download</button>
    </div>
  </div>

  <!-- VIEW 2: NICHE FINDER -->
  <div class="glass-panel" id="view-niche" style="display:none;">
    <div class="input-group">
      <label>YouTube API v3 Key (Required)</label>
      <input type="password" id="ytApiKey" class="text-input" placeholder="AIzaSy...">
    </div>
    
    <div class="input-group">
      <label>Niche Keyword</label>
      <input type="text" id="nicheQuery" class="text-input" value="AI Tools" placeholder="e.g., Faceless Animation">
    </div>

    <div class="row-inputs">
      <div class="input-group">
        <label>Time Period</label>
        <select id="nichePeriod">
          <option value="1">Last 24 Hours</option>
          <option value="7" selected>Last 7 Days</option>
          <option value="30">Last 30 Days</option>
        </select>
      </div>
      <div class="input-group">
        <label>Max Results</label>
        <select id="nicheMax">
          <option value="10">10 Videos</option>
          <option value="25" selected>25 Videos</option>
          <option value="50">50 Videos</option>
        </select>
      </div>
    </div>

    <button id="searchNicheBtn">Find Exploding Content</button>
    <div class="status" id="nicheStatus">Ready to analyze market.</div>

    <div class="list-header" id="nicheListHeader"><span id="nicheListCount">Results</span></div>
    <div class="data-list" id="nicheList"></div>
  </div>

</div>

<script>
  // Use your deployed URL here!
  const BACKEND = 'https://bulkdrop-backend.onrender.com'; 
  
  // --- UI TOGGLE LOGIC ---
  function switchTab(tab) {
    document.getElementById('view-downloader').style.display = tab === 'downloader' ? 'block' : 'none';
    document.getElementById('view-niche').style.display = tab === 'niche' ? 'block' : 'none';
    document.getElementById('tab-downloader').className = tab === 'downloader' ? 'nav-tab active' : 'nav-tab';
    document.getElementById('tab-niche').className = tab === 'niche' ? 'nav-tab active' : 'nav-tab';
  }

  // ==========================================
  // 1. DOWNLOADER LOGIC
  // ==========================================
  let pendingUrls = [];

  document.addEventListener("DOMContentLoaded", () => {
    // Bind Tab Clicks natively
    document.getElementById("tab-downloader").addEventListener("click", () => switchTab('downloader'));
    document.getElementById("tab-niche").addEventListener("click", () => switchTab('niche'));
    
    // Bind Button Clicks natively
    document.getElementById("btn-toggle-settings").addEventListener("click", toggleSettings);
    document.getElementById("btn-save-cookies").addEventListener("click", saveCookies);
    document.getElementById("formatBtn").addEventListener("click", formatUrls);
    document.getElementById("downloadAllBtn").addEventListener("click", downloadAll);
    document.getElementById("searchNicheBtn").addEventListener("click", searchNiche);

    // Load Local Storage Data
    document.getElementById("cookiesIg").value = localStorage.getItem("ig_cookies") || "";
    document.getElementById("cookiesTt").value = localStorage.getItem("tt_cookies") || "";
    document.getElementById("cookiesFb").value = localStorage.getItem("fb_cookies") || "";
    document.getElementById("cookiesYt").value = localStorage.getItem("yt_cookies") || "";
    document.getElementById("ytApiKey").value = localStorage.getItem("yt_api_key") || "";
  });

  function toggleSettings() {
    const panel = document.getElementById("settingsPanel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  }

  function saveCookies() {
    localStorage.setItem("ig_cookies", document.getElementById("cookiesIg").value.trim());
    localStorage.setItem("tt_cookies", document.getElementById("cookiesTt").value.trim());
    localStorage.setItem("fb_cookies", document.getElementById("cookiesFb").value.trim());
    localStorage.setItem("yt_cookies", document.getElementById("cookiesYt").value.trim());
    document.getElementById("dlStatus").textContent = "Cookies cached securely.";
    document.getElementById("dlStatus").className = "status success";
    toggleSettings();
  }

  function detectPlatform(url) {
    if (url.includes('instagram.com')) return { name: 'Instagram', class: 'bg-ig' };
    if (url.includes('tiktok.com')) return { name: 'TikTok', class: 'bg-tt' };
    if (url.includes('facebook.com') || url.includes('fb.watch')) return { name: 'Facebook', class: 'bg-fb' };
    if (url.includes('youtube.com') || url.includes('youtu.be')) return { name: 'YouTube', class: 'bg-yt' };
    return null; 
  }

  function formatUrls() {
    const rawText = document.getElementById('bulkInput').value;
    const spacedText = rawText.replace(/(https?:\/\/)/gi, ' $1');
    const urlRegex = /(https?:\/\/[^\s,]+)/g;
    const allUrls = spacedText.match(urlRegex) || [];
    
    const validUrls = allUrls.filter(url => {
      const lower = url.toLowerCase();
      return lower.includes('instagram') || lower.includes('tiktok') || lower.includes('facebook') || lower.includes('fb.watch') || lower.includes('youtube') || lower.includes('youtu.be');
    });

    const uniqueUrls = [...new Set(validUrls)];

    if (uniqueUrls.length === 0) {
      document.getElementById('dlStatus').textContent = "No valid URLs found.";
      document.getElementById('dlStatus').className = "status error";
      return;
    }

    pendingUrls = uniqueUrls.map((url, index) => {
      return { id: `item-${index}`, url: url, platform: detectPlatform(url), status: 'Ready', cssClass: 'status-ready' };
    });

    renderDlList();
    document.getElementById('dlListHeader').style.display = 'flex';
    document.getElementById('dlListCount').innerText = `${pendingUrls.length} Videos Queued`;
    document.getElementById('downloadAllBtn').style.display = 'block';
    document.getElementById('dlStatus').textContent = "List formatted.";
    document.getElementById('dlStatus').className = "status success";
  }

  function renderDlList() {
    const listDiv = document.getElementById('urlList');
    listDiv.innerHTML = '';
    pendingUrls.forEach(item => {
      const row = document.createElement('div');
      row.className = 'data-item';
      row.id = item.id;
      const displayUrl = item.url.replace(/^https?:\/\/(www\.)?/, '');
      row.innerHTML = `
        <div class="dl-row">
          <div class="plat-badge ${item.platform.class}">${item.platform.name}</div>
          <div class="item-url" title="${item.url}">${displayUrl}</div>
          <div class="item-status ${item.cssClass}" id="status-${item.id}">${item.status}</div>
        </div>
      `;
      listDiv.appendChild(row);
    });
  }

  function updateItemStatus(id, text, cssClass) {
    const badge = document.getElementById(`status-${id}`);
    if (badge) { badge.textContent = text; badge.className = `item-status ${cssClass}`; }
  }

  async function resolveAndDownload(item) {
    updateItemStatus(item.id, 'Extracting', 'status-working');
    
    let targetCookies = "";
    if (item.platform.name === 'Instagram') targetCookies = localStorage.getItem("ig_cookies") || "";
    if (item.platform.name === 'TikTok') targetCookies = localStorage.getItem("tt_cookies") || "";
    if (item.platform.name === 'Facebook') targetCookies = localStorage.getItem("fb_cookies") || "";
    if (item.platform.name === 'YouTube') targetCookies = localStorage.getItem("yt_cookies") || "";

    const isProxyPlatform = item.platform.name === 'TikTok' || item.platform.name === 'Facebook' || item.platform.name === 'Instagram';
    
    try {
      const res = await fetch(`${BACKEND}/download`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: item.url, cookies: targetCookies, proxy: isProxyPlatform })
      });
      
      if (!res.ok) { updateItemStatus(item.id, 'Failed', 'status-failed'); return false; }

      if (isProxyPlatform) {
        const blob = await res.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = `${item.platform.name.toLowerCase()}_${Date.now()}.mp4`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(blobUrl);
        updateItemStatus(item.id, 'Completed', 'status-done');
        return true;
      } else {
        const data = await res.json();
        if (data.url) {
            updateItemStatus(item.id, 'Completed', 'status-done');
            let dlLink = data.url;
            if (!dlLink.includes('dl=1') && !dlLink.includes('googlevideo')) { dlLink += (dlLink.includes('?') ? '&dl=1' : '?dl=1'); }
            window.open(dlLink, '_blank');
            return true;
        }
      }
    } catch (err) { updateItemStatus(item.id, 'Error', 'status-failed'); return false; }
  }

  async function downloadAll() {
    alert("Please ensure your browser allows pop-ups!");
    const btn = document.getElementById('downloadAllBtn');
    btn.disabled = true;
    document.getElementById('dlStatus').textContent = "Processing queue...";
    document.getElementById('dlStatus').className = "status active";

    for (let i = 0; i < pendingUrls.length; i++) {
      const item = pendingUrls[i];
      document.getElementById(item.id)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      await resolveAndDownload(item);
      if (i < pendingUrls.length - 1) await new Promise(r => setTimeout(r, 2000)); 
    }
    
    document.getElementById('dlStatus').textContent = "Batch sequence finished.";
    document.getElementById('dlStatus').className = "status success";
    btn.disabled = false;
  }


  // ==========================================
  // 2. NICHE FINDER LOGIC
  // ==========================================
  function formatNumber(num) {
    if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
    if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
    return num;
  }

  // Make this function global so the inline onclick inside the generated results still works
  window.sendToDownloader = function(url) {
    switchTab('downloader');
    const input = document.getElementById('bulkInput');
    input.value = input.value ? input.value + '\n' + url : url;
    document.getElementById('dlStatus').textContent = "Added to queue from Niche Finder.";
    document.getElementById('dlStatus').className = "status success";
    formatUrls();
  };

  async function searchNiche() {
    const apiKey = document.getElementById('ytApiKey').value.trim();
    const query = document.getElementById('nicheQuery').value.trim();
    const period = document.getElementById('nichePeriod').value;
    const maxResults = document.getElementById('nicheMax').value;
    
    const statusEl = document.getElementById('nicheStatus');
    const btn = document.getElementById('searchNicheBtn');

    if (!apiKey) {
      statusEl.textContent = "API Key is required.";
      statusEl.className = "status error";
      return;
    }

    localStorage.setItem("yt_api_key", apiKey);
    
    btn.disabled = true;
    statusEl.textContent = "Scanning YouTube Data API...";
    statusEl.className = "status active";
    
    document.getElementById('nicheListHeader').style.display = 'none';
    document.getElementById('nicheList').innerHTML = '';

    try {
      const res = await fetch(`${BACKEND}/youtube-niche`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: apiKey, query: query, period: period, max_results: maxResults })
      });
      
      const data = await res.json();
      
      if (!res.ok) {
        statusEl.textContent = `Error: ${data.error || 'Failed to fetch'}`;
        statusEl.className = "status error";
        btn.disabled = false;
        return;
      }

      if (data.results && data.results.length > 0) {
        document.getElementById('nicheListHeader').style.display = 'flex';
        document.getElementById('nicheListCount').innerText = `${data.results.length} Explosive Videos Found`;
        
        const listDiv = document.getElementById('nicheList');
        
        data.results.forEach(item => {
          const row = document.createElement('div');
          row.className = 'data-item';
          
          row.innerHTML = `
            <div class="niche-title" title="${item.title}">${item.title}</div>
            <div class="niche-stats">
              <span>👤 ${item.channel}</span>
              <span>👁️ ${formatNumber(item.views)} Views</span>
              <span>👥 ${formatNumber(item.subs)} Subs</span>
              <span>🗓️ ${item.age_days} Days Old</span>
            </div>
            <div class="niche-links">
              <a href="${item.video_link}" target="_blank">▶️ Watch Video</a>
              <a href="${item.channel_link}" target="_blank">👤 View Channel</a>
              <a href="javascript:void(0)" onclick="sendToDownloader('${item.video_link}')">⬇️ Queue to Download</a>
            </div>
          `;
          listDiv.appendChild(row);
        });

        statusEl.textContent = "Analysis complete.";
        statusEl.className = "status success";
      } else {
        statusEl.textContent = "No recent videos found for this topic.";
        statusEl.className = "status error";
      }
    } catch (error) {
      statusEl.textContent = "Network error connecting to backend.";
      statusEl.className = "status error";
    }
    
    btn.disabled = false;
  }
</script>
</body>
</html>
