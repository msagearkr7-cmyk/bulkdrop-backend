<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BulkDrop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'SF Mono', 'Fira Code', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #444;
    text-transform: uppercase;
    margin-bottom: 48px;
    text-align: center;
  }

  .logo span {
    color: #fff;
    font-size: 22px;
    display: block;
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }

  .box {
    width: 100%;
    max-width: 520px;
  }

  input {
    width: 100%;
    background: #111;
    border: 1px solid #222;
    color: #e8e8e8;
    padding: 12px 16px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    border-radius: 4px;
    transition: border-color 0.2s;
  }

  input:focus { border-color: #555; }
  input::placeholder { color: #333; }

  button {
    background: #e8e8e8;
    color: #0a0a0a;
    border: none;
    padding: 12px 20px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  .status {
    font-size: 12px;
    color: #444;
    min-height: 20px;
    margin-top: 14px;
  }
  .status.active { color: #888; }
  .status.error   { color: #e05555; }
  .status.success { color: #55e08a; }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .input-row input { flex: 1; }

  .controls-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
  }

  .controls-row label {
    font-size: 11px;
    color: #444;
    white-space: nowrap;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .controls-row input[type="number"] {
    width: 70px;
    text-align: center;
    padding: 8px 10px;
  }

  .progress-bar {
    width: 100%;
    height: 2px;
    background: #1a1a1a;
    border-radius: 1px;
    margin-bottom: 24px;
    overflow: hidden;
    display: none;
  }

  .progress-fill {
    height: 100%;
    background: #e8e8e8;
    width: 0%;
    transition: width 0.3s;
  }

  .user-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 380px;
    overflow-y: auto;
  }

  .user-item {
    background: #111;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }

  .user-item .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #1a1a1a;
    object-fit: cover;
    flex-shrink: 0;
  }

  .user-item .info { flex: 1; overflow: hidden; }

  .user-item .uname {
    color: #e8e8e8;
    font-weight: 700;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .user-item .fname {
    color: #555;
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .badge.private  { background: #1a1a1a; color: #555; }
  .badge.verified { background: #1a2d3d; color: #55aae0; }

  .action-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .action-row button {
    flex: 1;
    padding: 10px;
    font-size: 12px;
  }

  .btn-outline {
    background: transparent;
    color: #888;
    border: 1px solid #222;
  }
  .btn-outline:hover { color: #e8e8e8; border-color: #444; opacity: 1; }

  .backend-note {
    font-size: 11px;
    color: #2a2a2a;
    margin-top: 40px;
    text-align: center;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
</style>
</head>
<body>

<div class="logo">
  <span>BULKDROP</span>
  instagram following export
</div>

<div class="box">

  <div class="input-row">
    <input type="text" id="username" placeholder="@username or instagram.com/user" />
    <button id="fetchBtn" onclick="fetchFollowing()">FETCH</button>
  </div>

  <div class="controls-row">
    <label>Amount:</label>
    <input type="number" id="amount" value="12" min="1" max="200" />
    <label style="margin-left:8px">Token:</label>
    <input type="text" id="pageToken" placeholder="pagination token (optional)" style="flex:1" />
  </div>

  <div class="status" id="fetchStatus">enter an instagram username to export following list</div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="user-list" id="userList"></div>

  <div class="action-row" id="actionRow" style="display:none">
    <button class="btn-outline" onclick="exportCSV()">EXPORT CSV</button>
    <button class="btn-outline" id="loadMoreBtn" onclick="loadMore()">LOAD MORE</button>
    <button onclick="copyUsernames()">COPY USERNAMES</button>
  </div>

</div>

<div class="backend-note">
  backend: <span id="backendUrl"></span>
</div>

<script>
  const BACKEND = 'https://bulkdrop-backend.onrender.com';
  document.getElementById('backendUrl').textContent = BACKEND;

  let allUsers = [];
  let lastToken = '';
  let lastUsername = '';

  function cleanUsername(input) {
    input = input.trim();
    if (input.includes('instagram.com')) {
      const match = input.match(/instagram\.com\/([^/?#]+)/);
      return match ? match[1] : input;
    }
    return input.replace('@', '');
  }

  async function fetchFollowing(isPaginating = false) {
    const raw = document.getElementById('username').value;
    const username = cleanUsername(raw);
    if (!username) return;

    if (!isPaginating) {
      allUsers = [];
      lastToken = '';
      lastUsername = username;
      document.getElementById('userList').innerHTML = '';
      document.getElementById('actionRow').style.display = 'none';
    }

    const amount = parseInt(document.getElementById('amount').value) || 12;
    const pageToken = isPaginating ? lastToken : document.getElementById('pageToken').value.trim();

    const btn = document.getElementById('fetchBtn');
    const lmBtn = document.getElementById('loadMoreBtn');
    btn.disabled = true;
    if (lmBtn) lmBtn.disabled = true;

    setStatus(`Fetching @${username}...`, 'active');

    try {
      const res = await fetch(`${BACKEND}/scrape`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, amount, pagination_token: pageToken })
      });

      const data = await res.json();

      if (!res.ok) {
        setStatus(data.error || 'Failed to fetch', 'error');
        btn.disabled = false;
        if (lmBtn) lmBtn.disabled = false;
        return;
      }

      const users = data.following || [];
      lastToken = data.pagination_token || '';
      allUsers = allUsers.concat(users);

      if (allUsers.length === 0) {
        setStatus(`No following data found for @${username}`, 'error');
        btn.disabled = false;
        return;
      }

      setStatus(`Showing ${allUsers.length} accounts${data.has_more ? ' — more available' : ''}`, 'success');
      renderUsers(users, isPaginating);

      document.getElementById('actionRow').style.display = 'flex';
      if (lmBtn) {
        lmBtn.disabled = !data.has_more;
        lmBtn.textContent = data.has_more ? 'LOAD MORE' : 'NO MORE';
      }

    } catch (e) {
      setStatus('Cannot reach backend — is it running?', 'error');
    }

    btn.disabled = false;
  }

  function renderUsers(users, append = false) {
    const list = document.getElementById('userList');
    if (!append) list.innerHTML = '';

    users.forEach(u => {
      const item = document.createElement('div');
      item.className = 'user-item';

      const badges = [];
      if (u.is_verified) badges.push('<span class="badge verified">✓ VERIFIED</span>');
      if (u.is_private)  badges.push('<span class="badge private">PRIVATE</span>');

      item.innerHTML = `
        ${u.profile_pic
          ? `<img class="avatar" src="${u.profile_pic}" onerror="this.style.display='none'" />`
          : `<div class="avatar"></div>`}
        <div class="info">
          <div class="uname">@${u.username || '—'}</div>
          ${u.full_name ? `<div class="fname">${u.full_name}</div>` : ''}
        </div>
        ${badges.join('')}
      `;
      list.appendChild(item);
    });
  }

  function loadMore() {
    if (!lastToken) return;
    fetchFollowing(true);
  }

  function exportCSV() {
    if (!allUsers.length) return;
    const header = 'username,full_name,profile_url,is_private,is_verified,followers';
    const rows = allUsers.map(u =>
      [u.username, u.full_name, u.profile_url, u.is_private, u.is_verified, u.followers]
        .map(v => `"${String(v ?? '').replace(/"/g, '""')}"`)
        .join(',')
    );
    const csv = [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${lastUsername}_following.csv`;
    a.click();
  }

  function copyUsernames() {
    const names = allUsers.map(u => '@' + u.username).join('\n');
    navigator.clipboard.writeText(names).then(() => {
      setStatus(`Copied ${allUsers.length} usernames to clipboard`, 'success');
    });
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('fetchStatus');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchFollowing();
  });
</script>

</body>
</html>
