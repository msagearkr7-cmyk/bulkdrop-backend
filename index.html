<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BulkDrop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'SF Mono', 'Fira Code', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #444;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .logo span {
    color: #fff;
    font-size: 22px;
    display: block;
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }

  .box {
    width: 100%;
    max-width: 480px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  input {
    flex: 1;
    background: #111;
    border: 1px solid #222;
    color: #e8e8e8;
    padding: 12px 16px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    border-radius: 4px;
    transition: border-color 0.2s;
  }

  input:focus { border-color: #444; }
  input::placeholder { color: #333; }

  button {
    background: #e8e8e8;
    color: #0a0a0a;
    border: none;
    padding: 12px 20px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  .status {
    font-size: 12px;
    color: #444;
    min-height: 20px;
    margin-bottom: 24px;
  }

  .status.active { color: #888; }
  .status.error { color: #e05555; }
  .status.success { color: #55e08a; }

  .progress-bar {
    width: 100%;
    height: 2px;
    background: #1a1a1a;
    border-radius: 1px;
    margin-bottom: 24px;
    overflow: hidden;
    display: none;
  }

  .progress-fill {
    height: 100%;
    background: #e8e8e8;
    width: 0%;
    transition: width 0.3s;
  }

  .video-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 320px;
    overflow-y: auto;
  }

  .video-item {
    background: #111;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    gap: 12px;
  }

  .video-item .code {
    color: #555;
    font-size: 11px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .video-item .dl-btn {
    background: transparent;
    color: #888;
    border: 1px solid #222;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .video-item .dl-btn:hover { color: #e8e8e8; border-color: #444; opacity: 1; }
  .video-item .dl-btn.done { color: #55e08a; border-color: #1a3d2a; }

  .dl-all-btn {
    width: 100%;
    margin-top: 12px;
    display: none;
  }

  .backend-note {
    font-size: 11px;
    color: #2a2a2a;
    margin-top: 40px;
    text-align: center;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
</style>
</head>
<body>

<div class="logo">
  <span>BULKDROP</span>
  instagram video downloader
</div>

<div class="box">
  <div class="input-row">
    <input type="text" id="username" placeholder="@username or profile URL" />
    <button id="fetchBtn" onclick="fetchVideos()">FETCH</button>
  </div>

  <div class="status" id="status">enter a public instagram username</div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="video-list" id="videoList"></div>

  <button class="dl-all-btn" id="dlAllBtn" onclick="downloadAll()">DOWNLOAD ALL</button>
</div>

<div class="backend-note">
  backend: <span id="backendUrl">http://localhost:8080</span>
</div>

<script>
  // ← Change this to your Replit backend URL after deploying
  const BACKEND = 'https://bulkdrop-backend.onrender.com';
  document.getElementById('backendUrl').textContent = BACKEND;

  let videos = [];

  function cleanUsername(input) {
    input = input.trim();
    if (input.includes('instagram.com')) {
      const match = input.match(/instagram\.com\/([^/?#]+)/);
      return match ? match[1] : input;
    }
    return input.replace('@', '');
  }

  async function fetchVideos() {
    const raw = document.getElementById('username').value;
    const username = cleanUsername(raw);
    if (!username) return;

    const btn = document.getElementById('fetchBtn');
    const status = document.getElementById('status');
    const list = document.getElementById('videoList');
    const dlAll = document.getElementById('dlAllBtn');
    const bar = document.getElementById('progressBar');

    btn.disabled = true;
    list.innerHTML = '';
    dlAll.style.display = 'none';
    bar.style.display = 'none';
    videos = [];

    setStatus(`fetching @${username}...`, 'active');

    try {
      const res = await fetch(`${BACKEND}/scrape`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username })
      });

      const data = await res.json();

      if (!res.ok) {
        setStatus(data.error || 'failed to fetch', 'error');
        btn.disabled = false;
        return;
      }

      videos = data.videos;

      if (videos.length === 0) {
        setStatus(`no videos found on @${username}`, 'error');
        btn.disabled = false;
        return;
      }

      setStatus(`found ${videos.length} videos`, 'success');

      videos.forEach((v, i) => {
        const item = document.createElement('div');
        item.className = 'video-item';
        item.id = `item-${i}`;
        item.innerHTML = `
          <span class="code">${v.shortcode} · ${v.timestamp.slice(0, 10)}</span>
          <button class="dl-btn" onclick="downloadOne(${i})">DL</button>
        `;
        list.appendChild(item);
      });

      dlAll.style.display = 'block';

    } catch (e) {
      setStatus('cannot reach backend — is it running?', 'error');
    }

    btn.disabled = false;
  }

  function downloadOne(i) {
    const v = videos[i];
    const btn = document.querySelector(`#item-${i} .dl-btn`);

    // Use Cobalt API to proxy download
    const cobaltUrl = `https://cobalt.tools/api/json`;

    fetch(cobaltUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ url: `https://www.instagram.com/p/${v.shortcode}/`, vCodec: 'h264', vQuality: '720' })
    })
    .then(r => r.json())
    .then(data => {
      if (data.url) {
        triggerDownload(data.url, `${v.shortcode}.mp4`);
        btn.textContent = '✓';
        btn.classList.add('done');
      } else {
        // fallback: direct video_url from instaloader
        triggerDownload(v.url, `${v.shortcode}.mp4`);
        btn.textContent = '✓';
        btn.classList.add('done');
      }
    })
    .catch(() => {
      // fallback to direct URL
      triggerDownload(v.url, `${v.shortcode}.mp4`);
      btn.textContent = '✓';
      btn.classList.add('done');
    });
  }

  async function downloadAll() {
    const bar = document.getElementById('progressBar');
    const fill = document.getElementById('progressFill');
    const dlAll = document.getElementById('dlAllBtn');

    bar.style.display = 'block';
    dlAll.disabled = true;
    setStatus('downloading...', 'active');

    for (let i = 0; i < videos.length; i++) {
      downloadOne(i);
      fill.style.width = `${((i + 1) / videos.length) * 100}%`;
      await sleep(800); // stagger to avoid browser blocking
    }

    setStatus(`all ${videos.length} downloads triggered`, 'success');
    dlAll.disabled = false;
  }

  function triggerDownload(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchVideos();
  });
</script>

</body>
</html>
