<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BulkDrop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'SF Mono', 'Fira Code', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #444;
    text-transform: uppercase;
    margin-bottom: 48px;
    text-align: center;
  }

  .logo span {
    color: #fff;
    font-size: 22px;
    display: block;
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }

  .box {
    width: 100%;
    max-width: 480px;
  }

  /* ── SCREEN TRANSITIONS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── LOGIN SCREEN ── */
  .login-label {
    font-size: 11px;
    color: #444;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .field {
    margin-bottom: 10px;
  }

  input {
    width: 100%;
    background: #111;
    border: 1px solid #222;
    color: #e8e8e8;
    padding: 12px 16px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    border-radius: 4px;
    transition: border-color 0.2s;
  }

  input:focus { border-color: #555; }
  input::placeholder { color: #333; }

  button {
    background: #e8e8e8;
    color: #0a0a0a;
    border: none;
    padding: 12px 20px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  #loginBtn {
    width: 100%;
    margin-top: 6px;
    padding: 13px;
  }

  .status {
    font-size: 12px;
    color: #444;
    min-height: 20px;
    margin-top: 14px;
  }

  .status.active { color: #888; }
  .status.error { color: #e05555; }
  .status.success { color: #55e08a; }

  /* ── DOWNLOADER SCREEN ── */
  .user-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 14px;
    border-bottom: 1px solid #1a1a1a;
  }

  .user-bar .who {
    font-size: 12px;
    color: #555;
  }

  .user-bar .who span {
    color: #55e08a;
  }

  .logout-btn {
    background: transparent;
    color: #444;
    border: 1px solid #1e1e1e;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .logout-btn:hover { color: #e05555; border-color: #3d1a1a; opacity: 1; }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .input-row input { flex: 1; }

  #fetchBtn {
    flex-shrink: 0;
  }

  .progress-bar {
    width: 100%;
    height: 2px;
    background: #1a1a1a;
    border-radius: 1px;
    margin-bottom: 24px;
    overflow: hidden;
    display: none;
  }

  .progress-fill {
    height: 100%;
    background: #e8e8e8;
    width: 0%;
    transition: width 0.3s;
  }

  .video-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 320px;
    overflow-y: auto;
  }

  .video-item {
    background: #111;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    gap: 12px;
  }

  .video-item .code {
    color: #555;
    font-size: 11px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .video-item .dl-btn {
    background: transparent;
    color: #888;
    border: 1px solid #222;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .video-item .dl-btn:hover { color: #e8e8e8; border-color: #444; opacity: 1; }
  .video-item .dl-btn.done { color: #55e08a; border-color: #1a3d2a; }

  .dl-all-btn {
    width: 100%;
    margin-top: 12px;
    display: none;
  }

  .backend-note {
    font-size: 11px;
    color: #2a2a2a;
    margin-top: 40px;
    text-align: center;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
</style>
</head>
<body>

<div class="logo">
  <span>BULKDROP</span>
  instagram video downloader
</div>

<div class="box">

  <!-- ── LOGIN SCREEN ── -->
  <div class="screen active" id="loginScreen">
    <div class="login-label">sign in with instagram</div>

    <div class="field">
      <input type="text" id="igUser" placeholder="instagram username" autocomplete="username" />
    </div>
    <div class="field">
      <input type="password" id="igPass" placeholder="password" autocomplete="current-password" />
    </div>

    <button id="loginBtn" onclick="doLogin()">SIGN IN</button>

    <div class="status" id="loginStatus">use a burner account — not your main one</div>
  </div>

  <!-- ── DOWNLOADER SCREEN ── -->
  <div class="screen" id="downloaderScreen">

    <div class="user-bar">
      <div class="who">signed in as <span id="loggedInAs"></span></div>
      <button class="logout-btn" onclick="doLogout()">SIGN OUT</button>
    </div>

    <div class="input-row">
      <input type="text" id="username" placeholder="@username or profile URL" />
      <button id="fetchBtn" onclick="fetchVideos()">FETCH</button>
    </div>

    <div class="status" id="fetchStatus">enter a public instagram username</div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="video-list" id="videoList"></div>

    <button class="dl-all-btn" id="dlAllBtn" onclick="downloadAll()">DOWNLOAD ALL</button>
  </div>

</div>

<div class="backend-note">
  backend: <span id="backendUrl"></span>
</div>

<script>
  const BACKEND = 'https://bulkdrop-backend.onrender.com';
  document.getElementById('backendUrl').textContent = BACKEND;

  let videos = [];
  let currentIgUser = '';
  let currentIgPass = '';

  // ── LOGIN ──
  async function doLogin() {
    const user = document.getElementById('igUser').value.trim().replace('@','');
    const pass = document.getElementById('igPass').value.trim();

    if (!user || !pass) {
      setLoginStatus('Enter both username and password', 'error');
      return;
    }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    setLoginStatus('Signing in...', 'active');

    try {
      const res = await fetch(`${BACKEND}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });

      const data = await res.json();

      if (!res.ok) {
        setLoginStatus(data.error || 'Login failed', 'error');
        btn.disabled = false;
        return;
      }

      // Success — store and switch screens
      currentIgUser = user;
      currentIgPass = pass;
      setLoginStatus('', '');
      document.getElementById('loggedInAs').textContent = '@' + user;
      showScreen('downloaderScreen');

    } catch (e) {
      setLoginStatus('Cannot reach backend — is it running?', 'error');
    }

    btn.disabled = false;
  }

  function doLogout() {
    currentIgUser = '';
    currentIgPass = '';
    document.getElementById('igPass').value = '';
    document.getElementById('videoList').innerHTML = '';
    document.getElementById('dlAllBtn').style.display = 'none';
    setFetchStatus('enter a public instagram username', '');
    showScreen('loginScreen');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── FETCH VIDEOS ──
  function cleanUsername(input) {
    input = input.trim();
    if (input.includes('instagram.com')) {
      const match = input.match(/instagram\.com\/([^/?#]+)/);
      return match ? match[1] : input;
    }
    return input.replace('@', '');
  }

  async function fetchVideos() {
    const raw = document.getElementById('username').value;
    const username = cleanUsername(raw);
    if (!username) return;

    const btn = document.getElementById('fetchBtn');
    const list = document.getElementById('videoList');
    const dlAll = document.getElementById('dlAllBtn');
    const bar = document.getElementById('progressBar');

    btn.disabled = true;
    list.innerHTML = '';
    dlAll.style.display = 'none';
    bar.style.display = 'none';
    videos = [];

    setFetchStatus(`Fetching @${username}...`, 'active');

    try {
      const res = await fetch(`${BACKEND}/scrape`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username,
          ig_user: currentIgUser,
          ig_pass: currentIgPass
        })
      });

      const data = await res.json();

      if (!res.ok) {
        setFetchStatus(data.error || 'Failed to fetch', 'error');
        btn.disabled = false;
        return;
      }

      videos = data.videos;

      if (videos.length === 0) {
        setFetchStatus(`No videos found on @${username}`, 'error');
        btn.disabled = false;
        return;
      }

      setFetchStatus(`Found ${videos.length} videos`, 'success');

      videos.forEach((v, i) => {
        const item = document.createElement('div');
        item.className = 'video-item';
        item.id = `item-${i}`;
        item.innerHTML = `
          <span class="code">${v.shortcode} · ${v.timestamp.slice(0, 10)}</span>
          <button class="dl-btn" onclick="downloadOne(${i})">DL</button>
        `;
        list.appendChild(item);
      });

      dlAll.style.display = 'block';

    } catch (e) {
      setFetchStatus('Cannot reach backend — is it running?', 'error');
    }

    btn.disabled = false;
  }

  // ── DOWNLOAD ──
  function downloadOne(i) {
    const v = videos[i];
    const btn = document.querySelector(`#item-${i} .dl-btn`);

    fetch('https://cobalt.tools/api/json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ url: `https://www.instagram.com/p/${v.shortcode}/`, vCodec: 'h264', vQuality: '720' })
    })
    .then(r => r.json())
    .then(data => {
      triggerDownload(data.url || v.url, `${v.shortcode}.mp4`);
      markDone(btn);
    })
    .catch(() => {
      triggerDownload(v.url, `${v.shortcode}.mp4`);
      markDone(btn);
    });
  }

  async function downloadAll() {
    const bar = document.getElementById('progressBar');
    const fill = document.getElementById('progressFill');
    const dlAll = document.getElementById('dlAllBtn');

    bar.style.display = 'block';
    dlAll.disabled = true;
    setFetchStatus('Downloading...', 'active');

    for (let i = 0; i < videos.length; i++) {
      downloadOne(i);
      fill.style.width = `${((i + 1) / videos.length) * 100}%`;
      await sleep(800);
    }

    setFetchStatus(`All ${videos.length} downloads triggered`, 'success');
    dlAll.disabled = false;
  }

  function triggerDownload(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function markDone(btn) {
    btn.textContent = '✓';
    btn.classList.add('done');
  }

  // ── UTILS ──
  function setLoginStatus(msg, type = '') {
    const el = document.getElementById('loginStatus');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  function setFetchStatus(msg, type = '') {
    const el = document.getElementById('fetchStatus');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // Enter key on login fields
  ['igUser','igPass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });

  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchVideos();
  });
</script>

</body>
</html>
