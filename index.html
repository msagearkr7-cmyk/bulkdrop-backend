<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BulkDrop Pro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body { 
    background-color: #000; 
    color: #f5f5f7; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 40px 24px; 
    position: relative;
    overflow-x: hidden;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    z-index: -1;
    opacity: 0.6;
    animation: drift 15s infinite alternate ease-in-out;
  }
  body::before { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #5e5ce6; }
  body::after { bottom: -10%; right: -10%; width: 40vw; height: 40vw; background: #bf5af2; animation-delay: -5s; }
  @keyframes drift { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(5%, 5%) scale(1.1); } }

  .logo { font-size: 13px; font-weight: 500; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-bottom: 32px; text-align: center; }
  .logo span { color: #fff; font-size: 28px; font-weight: 700; display: block; letter-spacing: 0; margin-bottom: 4px; }
  
  .box { width: 100%; max-width: 650px; }
  
  .glass-panel {
    background: rgba(30, 30, 35, 0.4);
    -webkit-backdrop-filter: blur(24px);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }

  .settings-toggle { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.5); cursor: pointer; text-align: right; margin-bottom: 16px; transition: color 0.2s; display: flex; justify-content: flex-end; align-items: center; gap: 6px;}
  .settings-toggle:hover { color: #fff; }
  .settings-panel { display: none; background: rgba(0,0,0,0.3); border-radius: 16px; padding: 16px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
  
  .cookie-group { margin-bottom: 12px; }
  .cookie-group label { display: block; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.7); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .settings-panel textarea { width: 100%; height: 70px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: #a1a1a6; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; padding: 12px; resize: vertical; outline: none; border-radius: 12px; transition: border 0.2s;}
  .settings-panel textarea:focus { border-color: rgba(255,255,255,0.3); }
  
  .main-input { width: 100%; height: 160px; background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.1); color: #f5f5f7; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; border-radius: 16px; outline: none; resize: vertical; margin-bottom: 16px; transition: all 0.2s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);}
  .main-input:focus { border-color: rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); box-shadow: 0 0 0 4px rgba(255,255,255,0.05); }
  .main-input::placeholder { color: rgba(255,255,255,0.3); }

  button { background: #fff; color: #000; border: none; padding: 14px 24px; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 14px; transition: all 0.2s; width: 100%; font-family: inherit;}
  button:hover { transform: scale(0.98); opacity: 0.9; }
  button:active { transform: scale(0.96); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  
  .btn-accent { background: #0a84ff; color: #fff; } 
  .btn-accent:hover { background: #007aff; }

  .status { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.5); min-height: 20px; margin-top: 16px; text-align: center; }
  .status.active { color: #0a84ff; }
  .status.error { color: #ff453a; }
  .status.success { color: #32d74b; }
  
  .action-row { display: flex; gap: 12px; margin-top: 16px; }
  
  .list-header { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 32px; margin-bottom: 12px; display: none; justify-content: space-between;}
  .user-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; padding-right: 4px;}
  .user-item { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 13px; transition: background 0.2s;}
  .user-item:hover { background: rgba(255, 255, 255, 0.08); }
  
  .plat-badge { font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.05em; text-align: center; flex-shrink: 0;}
  .bg-ig { background: rgba(225, 48, 108, 0.2); color: #ff307b; }
  .bg-tt { background: rgba(255, 255, 255, 0.1); color: #fff; }
  .bg-yt { background: rgba(255, 0, 0, 0.15); color: #ff3b30; }

  .item-url { color: #f5f5f7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-family: ui-monospace, monospace; font-size: 12px; opacity: 0.8;}
  .item-status { font-size: 11px; padding: 4px 10px; border-radius: 8px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); white-space: nowrap; font-weight: 600; }
  
  .status-ready { color: rgba(255,255,255,0.6); }
  .status-working { color: #0a84ff; background: rgba(10, 132, 255, 0.15); }
  .status-done { color: #32d74b; background: rgba(50, 215, 75, 0.15); }
  .status-failed { color: #ff453a; background: rgba(255, 69, 58, 0.15); }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
</style>
</head>
<body>

<div class="logo"><span>BulkDrop Pro</span>Multi-Platform Engine</div>

<div class="box">
  
  <div class="glass-panel">
    <div class="settings-toggle" onclick="toggleSettings()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      Authentication Setup
    </div>
    
    <div class="settings-panel" id="settingsPanel">
      <div style="font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8); justify-content: space-between; display: flex; margin-bottom: 12px;">
        <span>Platform Cookies Setup:</span>
        <span style="color: #0a84ff; cursor:pointer;" onclick="saveCookies()">Save Settings</span>
      </div>
      
      <div class="cookie-group">
        <label>Instagram Cookies</label>
        <textarea id="cookiesIg" placeholder="# Netscape HTTP Cookie File..."></textarea>
      </div>
      
      <div class="cookie-group">
        <label>TikTok Cookies</label>
        <textarea id="cookiesTt" placeholder="# Netscape HTTP Cookie File..."></textarea>
      </div>
      
      <div class="cookie-group">
        <label>YouTube Cookies</label>
        <textarea id="cookiesYt" placeholder="# Netscape HTTP Cookie File..."></textarea>
      </div>
    </div>

    <textarea id="bulkInput" class="main-input" placeholder="Paste Video URLs here...&#10;https://www.instagram.com/reel/abc123/&#10;https://www.tiktok.com/@user/video/12345&#10;https://youtube.com/shorts/xyz789&#10;Glued links and messy text are okay!"></textarea>
    
    <button id="formatBtn" onclick="formatUrls()">Format Batch List</button>
    
    <div class="status" id="mainStatus">Ready to process links.</div>

    <div class="list-header" id="listHeader">
      <span id="listCount">0 Videos Found</span>
    </div>
    <div class="user-list" id="urlList"></div>

    <div class="action-row" id="actionRow" style="display:none;">
      <button class="btn-accent" id="downloadAllBtn" onclick="downloadAll()">Start Batch Download</button>
    </div>
  </div>
</div>

<script>
  const BACKEND = 'https://bulkdrop-backend.onrender.com'; 
  let pendingUrls = [];

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("cookiesIg").value = localStorage.getItem("ig_cookies") || "";
    document.getElementById("cookiesTt").value = localStorage.getItem("tt_cookies") || "";
    document.getElementById("cookiesYt").value = localStorage.getItem("yt_cookies") || "";
  });

  function toggleSettings() {
    const panel = document.getElementById("settingsPanel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  }

  function saveCookies() {
    localStorage.setItem("ig_cookies", document.getElementById("cookiesIg").value.trim());
    localStorage.setItem("tt_cookies", document.getElementById("cookiesTt").value.trim());
    localStorage.setItem("yt_cookies", document.getElementById("cookiesYt").value.trim());
    
    setStatus("Cookies cached securely in browser.", "success");
    toggleSettings();
  }

  function detectPlatform(url) {
    if (url.includes('instagram.com')) return { name: 'Instagram', class: 'bg-ig' };
    if (url.includes('tiktok.com')) return { name: 'TikTok', class: 'bg-tt' };
    if (url.includes('youtube.com') || url.includes('youtu.be')) return { name: 'YouTube', class: 'bg-yt' };
    return null; 
  }

  function formatUrls() {
    const rawText = document.getElementById('bulkInput').value;
    
    const spacedText = rawText.replace(/(https?:\/\/)/gi, ' $1');
    const urlRegex = /(https?:\/\/[^\s,]+)/g;
    const allUrls = spacedText.match(urlRegex) || [];
    
    const validUrls = allUrls.filter(url => {
      const lower = url.toLowerCase();
      return lower.includes('instagram.com') || 
             lower.includes('tiktok.com') || 
             lower.includes('youtube.com') || 
             lower.includes('youtu.be');
    });

    const uniqueUrls = [...new Set(validUrls)];

    if (uniqueUrls.length === 0) {
      setStatus("No valid IG, TikTok, or YouTube URLs found.", "error");
      return;
    }

    pendingUrls = uniqueUrls.map((url, index) => {
      const platform = detectPlatform(url);
      return {
        id: `item-${index}`,
        url: url,
        platform: platform,
        status: 'Ready',
        cssClass: 'status-ready'
      };
    });

    renderList();
    
    document.getElementById('listHeader').style.display = 'flex';
    document.getElementById('listCount').innerText = `${pendingUrls.length} Videos Queued`;
    document.getElementById('actionRow').style.display = 'flex';
    setStatus("List formatted. Ready for extraction.", "success");
  }

  function renderList() {
    const listDiv = document.getElementById('urlList');
    listDiv.innerHTML = '';

    pendingUrls.forEach(item => {
      const row = document.createElement('div');
      row.className = 'user-item';
      row.id = item.id;
      
      const displayUrl = item.url.replace(/^https?:\/\/(www\.)?/, '');

      row.innerHTML = `
        <div class="plat-badge ${item.platform.class}">${item.platform.name}</div>
        <div class="item-url" title="${item.url}">${displayUrl}</div>
        <div class="item-status ${item.cssClass}" id="status-${item.id}">${item.status}</div>
      `;
      listDiv.appendChild(row);
    });
  }

  function updateItemStatus(id, text, cssClass) {
    const badge = document.getElementById(`status-${id}`);
    if (badge) {
      badge.textContent = text;
      badge.className = `item-status ${cssClass}`;
    }
  }

  async function resolveAndDownload(item) {
    updateItemStatus(item.id, 'Extracting', 'status-working');
    
    // Dynamically grab the specific cookie based on the platform being processed
    let targetCookies = "";
    if (item.platform.name === 'Instagram') {
        targetCookies = localStorage.getItem("ig_cookies") || "";
    } else if (item.platform.name === 'TikTok') {
        targetCookies = localStorage.getItem("tt_cookies") || "";
    } else if (item.platform.name === 'YouTube') {
        targetCookies = localStorage.getItem("yt_cookies") || "";
    }
    
    try {
      const res = await fetch(`${BACKEND}/download`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: item.url, cookies: targetCookies })
      });
      const data = await res.json();
      
      if (res.ok && data.url) {
        updateItemStatus(item.id, 'Completed', 'status-done');
        let dlLink = data.url;
        
        if (item.platform.name === 'TikTok' || dlLink.includes('tiktok') || dlLink.includes('byte')) {
            dlLink = `${BACKEND}/proxy?url=${encodeURIComponent(dlLink)}`;
        } else {
            if (!dlLink.includes('dl=1') && !dlLink.includes('googlevideo')) {
                dlLink += (dlLink.includes('?') ? '&dl=1' : '?dl=1');
            }
        }
        
        window.open(dlLink, '_blank');
        return true;
      } else {
        updateItemStatus(item.id, 'Failed', 'status-failed');
        console.error(data.error);
        return false;
      }
    } catch (err) {
      updateItemStatus(item.id, 'Error', 'status-failed');
      return false;
    }
  }

  async function downloadAll() {
    alert("Please ensure your browser allows pop-ups for this site before continuing!");
    
    const btn = document.getElementById('downloadAllBtn');
    btn.disabled = true;
    
    setStatus("Processing multi-platform batch queue...", "active");

    for (let i = 0; i < pendingUrls.length; i++) {
      const item = pendingUrls[i];
      
      const rowElement = document.getElementById(item.id);
      if (rowElement) {
        rowElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      await resolveAndDownload(item);
      
      if (i < pendingUrls.length - 1) {
        setStatus(`Waiting 2 seconds... (${i + 1}/${pendingUrls.length} complete)`, "active");
        await new Promise(r => setTimeout(r, 2000)); 
      }
    }
    
    setStatus('Batch download sequence finished.', 'success');
    btn.disabled = false;
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('mainStatus');
    el.textContent = msg;
    el.className = 'status ' + type;
  }
</script>
</body>
</html>
