<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BulkDrop - Reels Downloader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'SF Mono', 'Fira Code', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #444;
    text-transform: uppercase;
    margin-bottom: 48px;
    text-align: center;
  }

  .logo span {
    color: #fff;
    font-size: 22px;
    display: block;
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }

  .box {
    width: 100%;
    max-width: 520px;
  }

  input {
    width: 100%;
    background: #111;
    border: 1px solid #222;
    color: #e8e8e8;
    padding: 12px 16px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    border-radius: 4px;
    transition: border-color 0.2s;
  }

  input:focus { border-color: #555; }
  input::placeholder { color: #333; }

  button {
    background: #e8e8e8;
    color: #0a0a0a;
    border: none;
    padding: 12px 20px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  .status {
    font-size: 12px;
    color: #444;
    min-height: 20px;
    margin-top: 14px;
    margin-bottom: 14px;
  }
  .status.active { color: #888; }
  .status.error   { color: #e05555; }
  .status.success { color: #55e08a; }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .input-row input { flex: 1; }

  .controls-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
  }

  .controls-row label {
    font-size: 11px;
    color: #444;
    white-space: nowrap;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .controls-row input[type="number"] {
    width: 70px;
    text-align: center;
    padding: 8px 10px;
  }

  .user-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 380px;
    overflow-y: auto;
  }

  .user-item {
    background: #111;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
  }

  .user-item .avatar {
    width: 40px;
    height: 60px;
    border-radius: 4px;
    background: #1a1a1a;
    object-fit: cover;
    flex-shrink: 0;
  }

  .user-item .info { flex: 1; overflow: hidden; }

  .user-item .uname {
    color: #e8e8e8;
    font-weight: 700;
    font-size: 12px;
  }

  .user-item .fname {
    color: #555;
    font-size: 11px;
  }

  .action-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .action-row button {
    flex: 1;
    padding: 10px;
    font-size: 12px;
  }

  .btn-outline {
    background: transparent;
    color: #888;
    border: 1px solid #222;
  }
  .btn-outline:hover { color: #e8e8e8; border-color: #444; opacity: 1; }

  .backend-note {
    font-size: 11px;
    color: #2a2a2a;
    margin-top: 40px;
    text-align: center;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
</style>
</head>
<body>

<div class="logo">
  <span>BULKDROP</span>
  instagram reels export & download
</div>

<div class="box">

  <div class="input-row">
    <input type="text" id="username" placeholder="@username or instagram.com/user" />
    <button id="fetchBtn" onclick="fetchReels()">FETCH</button>
  </div>

  <div class="controls-row">
    <label title="How many reels to fetch per request">How many:</label>
    <input type="number" id="amount" value="12" min="1" max="200" />
  </div>

  <div class="status" id="fetchStatus">enter an instagram username to fetch reels</div>

  <div class="user-list" id="userList"></div>

  <div class="action-row" id="actionRow" style="display:none">
    <button class="btn-outline" onclick="exportCSV()">EXPORT CSV</button>
    <button class="btn-outline" id="loadMoreBtn" onclick="loadMore()">LOAD MORE</button>
  </div>

  <div style="margin-top:10px;text-align:right">
    <button class="btn-outline" style="font-size:10px;padding:6px 12px" onclick="runDebug()" title="Show raw API response">DEBUG RAW</button>
  </div>

  <pre id="debugOut" style="display:none;margin-top:12px;background:#111;border:1px solid #1a1a1a;padding:12px;font-size:10px;color:#888;white-space:pre-wrap;max-height:200px;overflow-y:auto;border-radius:4px"></pre>

</div>

<div class="backend-note">
  backend: <span id="backendUrl"></span>
</div>

<script>
  const BACKEND = 'https://bulkdrop-backend.onrender.com';
  document.getElementById('backendUrl').textContent = BACKEND;

  let allReels = [];
  let lastToken = '';
  let lastUsername = '';

  function cleanUsername(input) {
    input = input.trim();
    if (input.includes('instagram.com')) {
      const match = input.match(/instagram\.com\/([^/?#]+)/);
      return match ? match[1] : input;
    }
    return input.replace('@', '');
  }

  async function fetchReels(isPaginating = false) {
    const raw = document.getElementById('username').value;
    const username = cleanUsername(raw);
    if (!username) return;

    if (!isPaginating) {
      allReels = [];
      lastToken = '';
      lastUsername = username;
      document.getElementById('userList').innerHTML = '';
      document.getElementById('actionRow').style.display = 'none';
    }

    const amount = parseInt(document.getElementById('amount').value) || 12;
    const pageToken = isPaginating ? lastToken : '';

    const btn = document.getElementById('fetchBtn');
    const lmBtn = document.getElementById('loadMoreBtn');
    btn.disabled = true;
    if (lmBtn) lmBtn.disabled = true;

    setStatus(`Fetching Reels for @${username}...`, 'active');

    try {
      const res = await fetch(`${BACKEND}/reels`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, amount, pagination_token: pageToken })
      });

      const data = await res.json();

      if (!res.ok) {
        setStatus(data.error || 'Failed to fetch', 'error');
        btn.disabled = false;
        if (lmBtn) lmBtn.disabled = false;
        return;
      }

      const reels = data.reels || [];
      lastToken = data.pagination_token || '';
      allReels = allReels.concat(reels);

      if (allReels.length === 0) {
        setStatus(`No reels found for @${username}`, 'error');
        btn.disabled = false;
        return;
      }

      setStatus(`Showing ${allReels.length} reels${data.has_more ? ' — more available' : ''}`, 'success');
      renderReels(reels, isPaginating);

      document.getElementById('actionRow').style.display = 'flex';
      if (lmBtn) {
        lmBtn.disabled = !data.has_more;
        lmBtn.textContent = data.has_more ? 'LOAD MORE' : 'NO MORE';
      }

    } catch (e) {
      setStatus('Cannot reach backend — is it running?', 'error');
    }

    btn.disabled = false;
  }

  function renderReels(reels, append = false) {
    const list = document.getElementById('userList');
    if (!append) list.innerHTML = '';

    reels.forEach(r => {
      const item = document.createElement('div');
      item.className = 'user-item';

      item.innerHTML = `
        <img class="avatar" src="${r.thumbnail}" onerror="this.style.display='none'" />
        <div class="info">
          <div class="uname">Views: ${r.play_count || 0} &nbsp;|&nbsp; Likes: ${r.like_count || 0}</div>
          <div class="fname" style="margin-top:6px;">
            <a href="${r.url}" target="_blank" style="color:#55aae0; text-decoration:none;">View Original Post ↗</a>
          </div>
        </div>
        <button class="btn-outline" style="padding: 8px 16px;" onclick="downloadCobalt('${r.url}', this)">COBALT DL</button>
      `;
      list.appendChild(item);
    });
  }

  // --- COBALT API INTEGRATION ---
  async function downloadCobalt(videoUrl, btnElement) {
    const originalText = btnElement.textContent;
    btnElement.textContent = 'FETCHING...';
    btnElement.disabled = true;

    try {
      const res = await fetch('https://api.cobalt.tools/', {
        method: 'POST',
        headers: {
          'Accept': 'application/json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ url: videoUrl })
      });
      
      const data = await res.json();
      
      if (data.url) {
        btnElement.textContent = 'DONE';
        // Open the raw MP4 stream in a new tab to initiate download
        window.open(data.url, '_blank');
      } else {
        alert('Cobalt API Error: ' + (data.text || JSON.stringify(data)));
        btnElement.textContent = 'ERROR';
      }
    } catch (e) {
      console.error(e);
      alert('Cobalt failed to connect. They might be temporarily rate-limiting browser requests.');
      btnElement.textContent = 'FAILED';
    }

    // Reset button after a few seconds
    setTimeout(() => {
      if (btnElement.textContent !== 'DONE') {
        btnElement.textContent = originalText;
        btnElement.disabled = false;
      }
    }, 3000);
  }

  function loadMore() {
    if (!lastToken) return;
    fetchReels(true);
  }

  function exportCSV() {
    if (!allReels.length) return;
    const header = 'id,url,play_count,like_count,taken_at';
    const rows = allReels.map(r =>
      [r.id, r.url, r.play_count, r.like_count, r.taken_at]
        .map(v => `"${String(v ?? '').replace(/"/g, '""')}"`)
        .join(',')
    );
    const csv = [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${lastUsername}_reels.csv`;
    a.click();
  }

  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchReels();
  });

  async function runDebug() {
    const raw = document.getElementById('username').value.trim();
    if (!raw) { setStatus('Enter a username first', 'error'); return; }
    const out = document.getElementById('debugOut');
    out.style.display = 'block';
    out.textContent = 'Calling /debug ...';
    try {
      const res = await fetch(`${BACKEND}/debug`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: raw })
      });
      const data = await res.json();
      out.textContent = JSON.stringify(data, null, 2);
    } catch(e) {
      out.textContent = 'Error: ' + e.message;
    }
  }
</script>

</body>
</html>
